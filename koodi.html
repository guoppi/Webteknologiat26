<!DOCTYPE html>
<html lang="fi">

<head>
    <meta charset="UTF-8">
    <title>Etusivu – Webteknologiat</title>
    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background:
                linear-gradient(rgba(0, 0, 0, 0.35), rgba(0, 0, 0, 0.35)),
                url("kuvat/maxresdefault.jpg");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            min-height: 100vh;

            padding: 40px;
            text-align: center;
            color: #fff;
            
        }

        h1 {
            font-size: 32px;
            margin-bottom: 25px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 18px;
            max-width: 400px;
            margin: 0 auto;
        }

        a {
            background: #4b6cb7;
            color: white;
            padding: 14px 20px;
            text-decoration: none;
            border-radius: 8px;
            font-size: 18px;
            transition: 0.2s;
            display: block;
        }

        a:hover {
            background: #395493;
        }
    </style>
</head>

<body>

    <h1>Koodisivu</h1>

    <p>Valitse sivu:</p>

    <div class="links">
        <a href="https://github.com/guoppi/Webteknologiat26/blob/main/css3/lomake.css">Lomake</a>
        <a href="https://github.com/guoppi/Webteknologiat26/blob/main/css3/html.css">Kurssisivu</a>
        <a href="https://github.com/guoppi/Webteknologiat26/blob/main/css3/grid.css">Grid</a>
        <a href="index.html">Takaisin pääsivulle</a>
    </div>

</body>

</html>
