<!DOCTYPE html>
<html lang="fi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laskin</title>
    <link rel="stylesheet" href="styles/calculator.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
</head>

<body>
    <div class="calculator-container">
        <div class="header">
            <i class="bi bi-calculator"></i>
            <h1>Laskin</h1>
        </div>

        <div class="input-row">
            <div class="number-input">
                <button type="button" class="btn-adjust" id="decrease1">-</button>
                <input type="number" id="number1" min="1" max="99" value="5" required>
                <button type="button" class="btn-adjust" id="increase1">+</button>
            </div>

            <select id="operator">
                <option value="+">+</option>
                <option value="-">-</option>
                <option value="*">*</option>
                <option value="/">/</option>
            </select>

            <div class="number-input">
                <button type="button" class="btn-adjust" id="decrease2">-</button>
                <input type="number" id="number2" min="1" max="99" value="6" required>
                <button type="button" class="btn-adjust" id="increase2">+</button>
            </div>
        </div>

        <button type="button" id="calculateBtn" class="btn-calculate">Laske</button>

        <div class="result-container">
            <span id="result">0</span>
        </div>

        <div class="history-container" id="historyContainer">
            <p><strong>laskutoimituksia: <span id="operationCount">0</span> kpl</strong></p>
            <ul id="historyList"></ul>
        </div>
    </div>

    <div id="errorDialog" title="Virhe">
        <p id="errorMessage"></p>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <script src="scripts/calculator.js"></script>
</body>

</html>
